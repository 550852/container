AWSTemplateFormatVersion: '2010-09-09'
Description: EFS for webserver logs (REQ-03)

Parameters:
  VpcId:
    Type: String
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String

Resources:
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow NFS from web tier
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: 10.0.0.0/16   # demo, in echt liever SG->SG

  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: false
      ThroughputMode: bursting

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PrivateSubnet1Id
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref PrivateSubnet2Id
      SecurityGroups:
        - !Ref EfsSecurityGroup

Outputs:
  EfsFileSystemId:
    Value: !Ref EfsFileSystem
    Description: EFS filesystem ID

# yum install -y amazon-efs-utils
# mkdir -p /var/log/web-logs
# mount -t efs ${EfsFileSystemId}:/ /var/log/web-logs
# Webserver zo configureren dat access logs naar /var/log/web-logs gaan